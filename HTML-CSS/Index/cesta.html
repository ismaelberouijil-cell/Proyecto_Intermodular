<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cesta de móviles</title>
<link rel="stylesheet" href="../Styles/cesta.css">

</head>
<body>

<div class="container">
    <h1>🛒 Tu cesta de móviles</h1>

    <div class="cart" id="cart">

        <div class="item" data-price="799">
            <img src="https://via.placeholder.com/100" />
            <div class="info">
                <div class="name">iPhone 15</div>
                <div class="price">799€</div>
            </div>
            <div class="controls">
                <button onclick="removeItem(this)">Eliminar</button>
            </div>
        </div>

        <div class="item" data-price="699">
            <img src="https://via.placeholder.com/100" />
            <div class="info">
                <div class="name">Samsung Galaxy S24</div>
                <div class="price">699€</div>
            </div>
            <div class="controls">
                <button onclick="removeItem(this)">Eliminar</button>
            </div>
        </div>

        <div class="item" data-price="499">
            <img src="https://via.placeholder.com/100" />
            <div class="info">
                <div class="name">Xiaomi 13T</div>
                <div class="price">499€</div>
            </div>
            <div class="controls">
                <button onclick="removeItem(this)">Eliminar</button>
            </div>
        </div>

    </div>

    <div class="summary">
        <div>Total:</div>
        <div class="total" id="total">0€</div>
    </div>
</div>

</body>
</html>
