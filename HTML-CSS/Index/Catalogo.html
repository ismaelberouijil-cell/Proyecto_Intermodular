<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo</title>
    <link rel="stylesheet" href="/HTML-CSS/Styles/Catalogo.css">
</head>
<body>
    
    <div class="contenedor"> 
        <h1>Galeria de Móviles</h1>
    </div>

    </div>

    <div id="contenedor"> 
         <div class="tarjeta">
            <img src="../img/Catalogo/iphone17pro.jpg" alt="iphonepro"/>
            <h3>Iphone 17 Pro Max</h3>
            <p>1500€</p>
            <button onclick="addToCart('Iphone 17 Pro Max', 1500)">Añadir a cesta</button>
        </div>

        <div class="tarjeta">
            <img src="../img/Catalogo/iphone17.jpg" alt="iphone"/>
            <h3>Iphone 17</h3>
            <p>900€</p>
            <button onclick="addToCart('Iphone 17', 900)">Añadir a cesta</button>
        </div>

        <div class="tarjeta">
            <img src="../img/Catalogo/Galaxy26.jpg" alt="galaxy26"/>

            <p>1650€</p>
            <button onclick="addToCart('Samsung Galaxy S26', 1650)">Añadir a cesta</button>
        </div>

        <div class="tarjeta">
            <img src="../img/Catalogo/Galaxy25.jpg" alt="galaxy25"/>

            <p>1350€</p>
            <button onclick="addToCart('Samsung Galaxy S25', 1350)">Añadir a cesta</button>
        </div>

        <div class="tarjeta">
            <img src="../img/Catalogo/oppo.jpg" alt="oppo"/>
            <h3>Oppo Find X9 Pro</h3>
            <p>960€</p>
            <button onclick="addToCart('Oppo Find X9 Pro', 960)">Añadir a cesta</button>
        </div>

        <div class="tarjeta">
            <img src="../img/Catalogo/huawei.jpg" alt="huawei"/>

            <button onclick="addToCart('Huawei Mate X6', 1499)">Añadir a cesta</button>

</html>
